<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Premium Dark Rounded Container -->
  <rect width="32" height="32" rx="9" fill="url(#bgGrad)" />
  
  <!-- Stylized Geometric "A" + Growth Trend -->
  <!-- Left Leg of "A" -->
  <path d="M8 24 L15 10 C15.5 9 16.5 9 17 10 L19 14" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Leg / Upward Trend of "A" -->
  <path d="M12 18 L24 8" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Arrow Head pointing Up-Right -->
  <path d="M19 8 L24 8 L24 13" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
